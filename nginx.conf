# nginx.conf

server {
    listen 80;
    server_name localhost;

    # Static assets (JS, CSS, images, fonts) with content-hash in filename
    # These are safe to cache long-term because Vite generates unique hashes per build
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";

        # If the hashed file doesn't exist (e.g. after a new deploy),
        # return 404 immediately instead of falling back to index.html
        # This prevents Cloudflare 522 timeout on stale asset requests
        try_files $uri =404;
    }

    # index.html must never be cached so users always get the latest version
    # which references the correct hashed asset filenames
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        expires off;
    }

    # All other routes - SPA fallback to index.html
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        expires off;
    }

    # Additional configurations go here...
}
