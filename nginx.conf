server {
    listen 80;
    server_name simkeuv2.uiidalwa.web.id;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_min_length 1024;
    gzip_types
        text/css
        application/javascript
        application/json
        image/svg+xml;

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /loader.css {
        try_files $uri =404;
    }

    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
    }

    location = /mockServiceWorker.js {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
